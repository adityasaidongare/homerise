# Spring Boot Application Properties for HomeRise
spring.application.name=homerise-backend

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/homerise?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret & Expiry
app.jwt.secret=${JWT_SECRET:HomeRiseJwtSecretKeyForReview123456789-HomeRiseJwtSecretKeyForReview987654321}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3004,http://localhost:3006,http://localhost:3008,http://localhost:3010,http://localhost:3012,https://homerise-frontend.netlify.app}
# Server
server.port=${PORT:8080}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.homerise=DEBUG
